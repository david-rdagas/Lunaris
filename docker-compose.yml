services:
# -----------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data 
    networks:
    - lunaris-internal-network
# -----------------------------------------------------
  simulator:
    build: ./simulators
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
    restart: on-failure
    networks:
      - lunaris-internal-network

volumes:
  influxdb_data:
networks:
  lunaris-internal-network:
    name: lunaris-internal-network